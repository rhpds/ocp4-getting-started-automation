---
# Allow SA to push images to the internal registry
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datasphere-pipeline-image-pusher
  namespace: {{ .Values.datasphere.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-pusher
subjects:
  - kind: ServiceAccount
    name: datasphere-pipeline
    namespace: {{ .Values.datasphere.namespace }}
---
# Allow SA to patch Deployments (oc set image) and get Routes
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datasphere-pipeline-deployer
  namespace: {{ .Values.datasphere.namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datasphere-pipeline-deployer
  namespace: {{ .Values.datasphere.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datasphere-pipeline-deployer
subjects:
  - kind: ServiceAccount
    name: datasphere-pipeline
    namespace: {{ .Values.datasphere.namespace }}
---
# Allow EventListener SA to watch Tekton Triggers resources (required by the EventListener pod)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datasphere-pipeline-triggers-watcher
  namespace: {{ .Values.datasphere.namespace }}
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "triggerbindings", "triggertemplates", "triggers", "interceptors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create", "get", "list"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datasphere-pipeline-triggers-watcher
  namespace: {{ .Values.datasphere.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datasphere-pipeline-triggers-watcher
subjects:
  - kind: ServiceAccount
    name: datasphere-pipeline
    namespace: {{ .Values.datasphere.namespace }}
---
# ClusterInterceptors are cluster-scoped — needs a ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datasphere-pipeline-{{ .Values.datasphere.namespace }}-interceptors
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["clusterinterceptors"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datasphere-pipeline-{{ .Values.datasphere.namespace }}-interceptors
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: datasphere-pipeline-{{ .Values.datasphere.namespace }}-interceptors
subjects:
  - kind: ServiceAccount
    name: datasphere-pipeline
    namespace: {{ .Values.datasphere.namespace }}
---
# Allow webhook-config job to read Gitea CR for admin credentials
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datasphere-pipeline-gitea-reader
  namespace: {{ .Values.gitea.namespace }}
rules:
  - apiGroups: ["pfe.rhpds.com"]
    resources: ["gitea"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datasphere-pipeline-gitea-reader
  namespace: {{ .Values.gitea.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datasphere-pipeline-gitea-reader
subjects:
  - kind: ServiceAccount
    name: datasphere-pipeline
    namespace: {{ .Values.datasphere.namespace }}
