---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: datasphere-api-pipeline
  namespace: {{ .Values.datasphere.namespace }}
spec:
  params:
    - name: APP_NAME
      type: string
      default: datasphere-api
    - name: APP_GIT_URL
      type: string
      description: Gitea URL for the datasphere-api repository
      default: https://gitea.{{ .Values.deployer.domain }}/{{ .Values.tenant.user.name }}/datasphere-api
    - name: APP_GIT_REVISION
      type: string
      default: main
    - name: IMAGE
      type: string
      default: image-registry.openshift-image-registry.svc:5000/{{ .Values.datasphere.namespace }}/datasphere-api:latest

  workspaces:
    - name: source

  tasks:
    # ── 1. Clone source from Gitea ─────────────────────────────────────────
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: url
          value: $(params.APP_GIT_URL)
        - name: revision
          value: $(params.APP_GIT_REVISION)
        - name: deleteExisting
          value: 'true'
      workspaces:
        - name: output
          workspace: source

    # ── 2. Build container image from Dockerfile using Buildah ────────────
    - name: build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: CONTEXT
          value: .
        - name: STORAGE_DRIVER
          value: vfs
        - name: TLSVERIFY
          value: 'false'
        - name: FORMAT
          value: oci
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source

    # ── 3. Update the running deployment to the new image ────────────────
    - name: deploy
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: >-
            oc set image
            deployment/$(params.APP_NAME)
            $(params.APP_NAME)=$(params.IMAGE)
            -n {{ .Values.datasphere.namespace }}
      runAfter:
        - build-image
