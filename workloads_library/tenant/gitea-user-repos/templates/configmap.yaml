---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-user-repos-{{ .Values.user.name }}-scripts
  namespace: {{ .Values.gitea.namespace }}
data:
  read-gitea-cr.sh: |
    #!/bin/bash
    # Identical to the cluster-level version — reads Gitea CR credentials.
    set -euo pipefail

    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

    CR=$(curl -sf \
      --cacert "$CACERT" \
      -H "Authorization: Bearer $TOKEN" \
      "https://kubernetes.default.svc/apis/pfe.rhpds.com/v1/namespaces/${GITEA_NAMESPACE}/giteas/${GITEA_CR_NAME}")

    GITEA_ADMIN_USER=$(echo "$CR" | python3 -c \
      "import sys,json; print(json.load(sys.stdin)['spec']['giteaAdminUser'])")
    GITEA_ADMIN_PASS=$(echo "$CR" | python3 -c \
      "import sys,json; print(json.load(sys.stdin)['status']['adminPassword'])")
    GITEA_ROUTE=$(echo "$CR" | python3 -c \
      "import sys,json; print(json.load(sys.stdin)['status']['giteaRoute'])")

    cat > /creds/env <<EOF
    export GITEA_ADMIN_USER="${GITEA_ADMIN_USER}"
    export GITEA_ADMIN_PASS="${GITEA_ADMIN_PASS}"
    export GITEA_ROUTE="${GITEA_ROUTE}"
    EOF

  seed-user-repos.sh: |
    #!/bin/bash
    # Creates fresh per-user repo copies from admin-owned repos.
    # Each user repo gets a clean single-commit history.
    set -euo pipefail

    source /creds/env

    GIT_BASE="${GITEA_ROUTE#https://}"

    git config --global user.email "admin@gitea.local"
    git config --global user.name "Gitea Admin"

    for REPO_NAME in ${REPOS}; do
      # Check if user repo already exists
      HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" \
        -u "${GITEA_ADMIN_USER}:${GITEA_ADMIN_PASS}" \
        "${GITEA_ROUTE}/api/v1/repos/${GITEA_USER}/${REPO_NAME}")

      if [ "${HTTP_STATUS}" = "200" ]; then
        echo "Repo ${GITEA_USER}/${REPO_NAME} already exists — skipping"
        continue
      fi

      echo "Creating ${GITEA_USER}/${REPO_NAME} from admin/${REPO_NAME}..."

      # Create empty repo in user's account (admin creates on behalf of user)
      curl -sf -X POST \
        -u "${GITEA_ADMIN_USER}:${GITEA_ADMIN_PASS}" \
        -H "Content-Type: application/json" \
        -d "{\"name\":\"${REPO_NAME}\",\"private\":false,\"auto_init\":false,\"default_branch\":\"main\"}" \
        "${GITEA_ROUTE}/api/v1/admin/users/${GITEA_USER}/repos"

      # Clone from admin repo, create fresh copy for student
      WORKDIR=$(mktemp -d)
      git clone \
        "http://${GITEA_ADMIN_USER}:${GITEA_ADMIN_PASS}@${GIT_BASE}/${GITEA_ADMIN_USER}/${REPO_NAME}.git" \
        "${WORKDIR}/src"

      # Fresh repo — single commit, no upstream history
      mkdir "${WORKDIR}/fresh"
      cp -r "${WORKDIR}/src/." "${WORKDIR}/fresh/"
      rm -rf "${WORKDIR}/fresh/.git"
      cd "${WORKDIR}/fresh"
      git init -b main
      git add .
      git commit -m "Initial commit"
      git push \
        "http://${GITEA_ADMIN_USER}:${GITEA_ADMIN_PASS}@${GIT_BASE}/${GITEA_USER}/${REPO_NAME}.git" \
        main

      cd /
      rm -rf "${WORKDIR}"
      echo "Created ${GITEA_USER}/${REPO_NAME}"
    done

    echo "Done."
