---
# Runs in the gitea namespace so the Job can read the Gitea CR.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-user-repos-{{ .Values.user.name }}
  namespace: {{ .Values.gitea.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-user-repos-{{ .Values.user.name }}
  namespace: {{ .Values.gitea.namespace }}
rules:
  - apiGroups: ["pfe.rhpds.com"]
    resources: ["gitea"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-user-repos-{{ .Values.user.name }}
  namespace: {{ .Values.gitea.namespace }}
subjects:
  - kind: ServiceAccount
    name: gitea-user-repos-{{ .Values.user.name }}
    namespace: {{ .Values.gitea.namespace }}
roleRef:
  kind: Role
  name: gitea-user-repos-{{ .Values.user.name }}
  apiGroup: rbac.authorization.k8s.io
