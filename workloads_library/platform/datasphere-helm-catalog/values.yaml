# workloads_library/platform/datasphere-helm-catalog/values.yaml
#
# Registers the DataSphere Helm chart in the OpenShift Developer Catalog via
# a cluster-scoped HelmChartRepository.
#
# The chart must be published to the configured URL before this workload is enabled.
# Recommended: push as OCI artifact to quay.io alongside the container images.
#   helm package datasphere/gitops
#   helm push datasphere-1.x.x.tgz oci://quay.io/rhpds
#
# Then set:
#   repoURL: oci://quay.io/rhpds
#
# For a standard HTTP Helm repo (e.g. GitHub Pages):
#   repoURL: https://rhpds.github.io/ocp4-getting-started-automation
#
# See: https://docs.openshift.com/container-platform/latest/applications/helm_charts/ocp-helm-openshift-catalog.html

# URL of the Helm chart repository. Override in the catalog via platformValues.
repoURL: oci://quay.io/rhpds

# Display name shown in the OpenShift Developer Catalog.
displayName: "DataSphere Lab Charts"
description: "DataSphere application charts for the OpenShift Getting Started lab"
