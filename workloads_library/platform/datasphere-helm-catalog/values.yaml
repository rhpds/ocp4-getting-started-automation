# workloads_library/platform/datasphere-helm-catalog/values.yaml
#
# Registers the DataSphere Helm chart in the OpenShift Developer Catalog via a
# cluster-scoped HelmChartRepository pointing at the cluster Gitea's package registry.
#
# The chart must first be pushed to Gitea by the gitea-content-init Job.
# Enable both giteaContentInit and datasphereHelmCatalog together in the catalog.
#
# See: https://docs.openshift.com/container-platform/latest/applications/helm_charts/ocp-helm-openshift-catalog.html

# deployer — injected automatically from the cluster. Do not set in catalog.
deployer:
  domain: cluster.example.com

# Gitea admin user — must match ocp4_workload_gitea_operator_admin_user in cluster CI.
gitea:
  adminUser: gitea-admin

# Display name shown in the OpenShift Developer Catalog.
displayName: "DataSphere Lab Charts"
description: "DataSphere application charts for the OpenShift Getting Started lab"
