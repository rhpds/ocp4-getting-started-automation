---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-content-init-scripts
  namespace: {{ .Values.gitea.namespace }}
data:
  read-gitea-cr.sh: |
    #!/bin/bash
    # Reads admin credentials and route from the Gitea CR via the k8s API.
    # Writes them to /creds/env so the main container can source them.
    set -euo pipefail

    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

    CR=$(curl -sf \
      --cacert "$CACERT" \
      -H "Authorization: Bearer $TOKEN" \
      "https://kubernetes.default.svc/apis/pfe.rhpds.com/v1/namespaces/${GITEA_NAMESPACE}/gitea/${GITEA_CR_NAME}")

    GITEA_ADMIN_USER=$(echo "$CR" | python3 -c \
      "import sys,json; print(json.load(sys.stdin)['spec']['giteaAdminUser'])")
    GITEA_ADMIN_PASS=$(echo "$CR" | python3 -c \
      "import sys,json; print(json.load(sys.stdin)['status']['adminPassword'])")
    GITEA_ROUTE=$(echo "$CR" | python3 -c \
      "import sys,json; print(json.load(sys.stdin)['status']['giteaRoute'])")

    cat > /creds/env <<EOF
    export GITEA_ADMIN_USER="${GITEA_ADMIN_USER}"
    export GITEA_ADMIN_PASS="${GITEA_ADMIN_PASS}"
    export GITEA_ROUTE="${GITEA_ROUTE}"
    EOF
    echo "Gitea route: ${GITEA_ROUTE}, admin user: ${GITEA_ADMIN_USER}"

  init-repos.py: |
    #!/usr/bin/env python3
    """
    Seeds Gitea with DataSphere repos and pushes the Helm chart to the package registry.
    Uses Gitea's contents API and GitHub's archive API — no git binary required.
    All operations are idempotent.
    """
    import base64, io, json, os, sys, tarfile, urllib.error, urllib.request

    GITEA_ADMIN_USER = os.environ["GITEA_ADMIN_USER"]
    GITEA_ADMIN_PASS = os.environ["GITEA_ADMIN_PASS"]
    GITEA_ROUTE = os.environ["GITEA_ROUTE"].rstrip("/")
    AUTOMATION_REPO_URL = os.environ["AUTOMATION_REPO_URL"]
    AUTOMATION_REPO_REVISION = os.environ["AUTOMATION_REPO_REVISION"]

    REPOS = {
    {{- range .Values.repositories }}
        "{{ .name }}": "{{ .sourceSubdir }}",
    {{- end }}
    }
    HELM_CHART_SUBDIR = "{{ .Values.helmChart.sourceSubdir }}"

    _auth = base64.b64encode(f"{GITEA_ADMIN_USER}:{GITEA_ADMIN_PASS}".encode()).decode()

    def gitea_req(method, path, data=None, content_type="application/json"):
        url = f"{GITEA_ROUTE}{path}"
        headers = {"Authorization": f"Basic {_auth}"}
        body = None
        if data is not None:
            if isinstance(data, dict):
                body = json.dumps(data).encode()
                headers["Content-Type"] = "application/json"
            elif isinstance(data, bytes):
                body = data
                headers["Content-Type"] = content_type
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            with urllib.request.urlopen(req) as r:
                return r.status, r.read()
        except urllib.error.HTTPError as e:
            return e.code, e.read()

    # Download automation repo as a GitHub archive tarball
    repo_base = AUTOMATION_REPO_URL[:-4] if AUTOMATION_REPO_URL.endswith(".git") else AUTOMATION_REPO_URL
    tarball_url = f"{repo_base}/archive/{AUTOMATION_REPO_REVISION}.tar.gz"
    print(f"Downloading {tarball_url}...")
    with urllib.request.urlopen(tarball_url) as r:
        tarball_data = r.read()
    print(f"Downloaded {len(tarball_data)} bytes")

    tar = tarfile.open(fileobj=io.BytesIO(tarball_data), mode="r:gz")
    top = tar.getnames()[0].split("/")[0]

    def get_subdir_files(subdir):
        """Return {relative_path: bytes} for all files under top_level/subdir/ in the tarball."""
        prefix = f"{top}/{subdir}/"
        result = {}
        for m in tar.getmembers():
            if not m.isfile() or not m.name.startswith(prefix):
                continue
            rel = m.name[len(prefix):]
            if rel:
                f = tar.extractfile(m)
                if f:
                    result[rel] = f.read()
        return result

    # Create repos via Gitea Contents API
    for repo_name, source_subdir in REPOS.items():
        status, _ = gitea_req("GET", f"/api/v1/repos/{GITEA_ADMIN_USER}/{repo_name}")
        if status == 200:
            print(f"Repo {repo_name} already exists — skipping")
            continue

        print(f"Creating {repo_name} from {source_subdir}...")
        status, body = gitea_req("POST", "/api/v1/user/repos", {
            "name": repo_name,
            "private": False,
            "auto_init": False,
            "default_branch": "main",
        })
        if status not in (200, 201):
            print(f"ERROR creating repo {repo_name}: {status} {body}", file=sys.stderr)
            sys.exit(1)

        files = get_subdir_files(source_subdir)
        print(f"  Uploading {len(files)} files...")
        for rel_path, content in sorted(files.items()):
            status, body = gitea_req("POST",
                f"/api/v1/repos/{GITEA_ADMIN_USER}/{repo_name}/contents/{rel_path}",
                {"message": "Initial commit", "content": base64.b64encode(content).decode()})
            if status not in (200, 201):
                print(f"  WARNING {rel_path}: {status} {body[:200]}", file=sys.stderr)
        print(f"  Done: {repo_name}")

    # Package and push Helm chart to Gitea package registry
    chart_files = get_subdir_files(HELM_CHART_SUBDIR)
    chart_yaml = next((c.decode() for p, c in chart_files.items() if p == "Chart.yaml"), "")
    chart_name = next((l.split(":", 1)[1].strip() for l in chart_yaml.splitlines() if l.startswith("name:")), "")
    chart_version = next((l.split(":", 1)[1].strip() for l in chart_yaml.splitlines() if l.startswith("version:")), "")
    print(f"Packaging Helm chart {chart_name}-{chart_version}...")

    status, _ = gitea_req("GET", f"/api/packages/{GITEA_ADMIN_USER}/helm/api/charts/{chart_name}/{chart_version}")
    if status == 200:
        print("Chart already in registry — skipping")
    else:
        pkg = io.BytesIO()
        with tarfile.open(fileobj=pkg, mode="w:gz") as tf:
            for rel_path, content in sorted(chart_files.items()):
                info = tarfile.TarInfo(name=f"{chart_name}/{rel_path}")
                info.size = len(content)
                tf.addfile(info, io.BytesIO(content))
        chart_bytes = pkg.getvalue()

        boundary = "GitChartBoundary42"
        body = (
            f"--{boundary}\r\nContent-Disposition: form-data; name=\"chart\"; "
            f"filename=\"{chart_name}-{chart_version}.tgz\"\r\n"
            f"Content-Type: application/octet-stream\r\n\r\n"
        ).encode() + chart_bytes + f"\r\n--{boundary}--\r\n".encode()

        status, resp = gitea_req("POST",
            f"/api/packages/{GITEA_ADMIN_USER}/helm/api/charts",
            data=body,
            content_type=f"multipart/form-data; boundary={boundary}")
        if status not in (200, 201):
            print(f"ERROR pushing chart: {status} {resp}", file=sys.stderr)
            sys.exit(1)
        print(f"Chart {chart_name}-{chart_version} pushed to Gitea package registry")

    print("Done.")
