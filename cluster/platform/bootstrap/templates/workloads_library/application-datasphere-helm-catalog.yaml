{{ if .Values.datasphereHelmCatalog.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datasphere-helm-catalog
  namespace: openshift-gitops
  labels:
    app: datasphere-helm-catalog
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: {{ .Values.datasphereHelmCatalog.git.repoURL }}
    targetRevision: {{ .Values.datasphereHelmCatalog.git.targetRevision }}
    path: {{ .Values.datasphereHelmCatalog.git.path }}
    helm:
      values: |
        deployer:
          domain: {{ .Values.deployer.domain | quote }}
        gitea:
          adminUser: {{ .Values.datasphereHelmCatalog.gitea.adminUser | default "gitea-admin" | quote }}

  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
