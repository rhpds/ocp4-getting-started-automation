apiVersion: v1
kind: Service
metadata:
  name: example3-helm-parameterized
  labels:
    app: example3-helm-parameterized
    tenant: {{ .Values.tenant.name }}
spec:
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: example3-helm-parameterized
  type: ClusterIP
