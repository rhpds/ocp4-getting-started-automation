# tenant/bootstrap/values.yaml
#
# Entry-point values for the tenant bootstrap chart. This chart is deployed as
# a unique ArgoCD Application per user: "bootstrap-tenant-<GUID>".
#
# The Ansible role ocp4_workload_gitops_bootstrap creates that Application and
# injects deployer.* from the live cluster automatically. Everything else here
# is controlled via ocp4_workload_gitops_bootstrap_helm_values in the catalog.
#
# MINIMUM CATALOG BLOCK:
#   ocp4_workload_gitops_bootstrap_helm_values:
#     tenant:
#       name: "{{ guid }}"
#       user:
#         name: "{{ ocp4_workload_tenant_keycloak_username }}"
#
# See tenant/START_HERE.md for the full catalog snippet.

# ---------------------------------------------------------------------------
# Git defaults — inherited by all labs via YAML anchor.
# Override targetRevision per-lab in the catalog when developing on a branch.
# ---------------------------------------------------------------------------
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/ocp4-getting-started-automation.git
  targetRevision: main

# ---------------------------------------------------------------------------
# deployer — injected automatically by the Ansible role from the live cluster.
# These placeholders exist only so `helm template` works locally.
# Never set these in the catalog; the role always overwrites them.
# ---------------------------------------------------------------------------
deployer:
  domain: apps.cluster-guid.example.com
  apiUrl: https://api.cluster-guid.example.com:6443
  guid: GUID

# ---------------------------------------------------------------------------
# tenant — identifies the user this deployment belongs to.
# Set both of these from the catalog.
#   name: the GUID string. Used in resource names, labels, and ArgoCD app names.
#   user.name: the Keycloak/HTPasswd username (typically "user-<GUID>").
#              Used in namespace names and provision data.
# ---------------------------------------------------------------------------
tenant:
  name: GUID
  user:
    name: USERNAME

# ---------------------------------------------------------------------------
# labs.datasphere — pre-deploys the full 2-tier DataSphere app so students
# can see the finished product at the start of the lab.
#
# Deploys to the {user}-datasphere namespace. The student's build namespaces
# ({user}-lab and {user}-lab-helm) are left empty — students populate them
# during the lab exercises.
#
# namespace: must already exist (ocp4_workload_tenant_namespace, suffix: datasphere).
# images: override to pin specific versions. Defaults match the stable release.
# theme: "earth". Leave as "earth" for the pre-deployed instance.
# git:   only override targetRevision when testing on a feature branch.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# gitea — per-user Gitea repo seeding.
# Creates fresh copies of DataSphere repos in the student's Gitea account.
# Requires gitea-content-init to have run at the cluster level first.
# ---------------------------------------------------------------------------
gitea:
  namespace: gitea
  crName: gitea
  userRepos:
    enabled: false
    git:
      path: workloads_library/tenant/gitea-user-repos
      repoURL: https://github.com/rhpds/ocp4-getting-started-automation.git
      targetRevision: main

labs:
  datasphere:
    enabled: false
    namespace: NAMESPACE-MUST-BE-SET-BY-CATALOG
    git:
      path: datasphere/gitops
      <<: *git_defaults
    images:
      ui: quay.io/rhpds/datasphere-ui:1.1.3
      api: quay.io/rhn_sa_sborenst/datasphere-api:1.4.0
    theme: earth
    api:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      hpa:
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 50
