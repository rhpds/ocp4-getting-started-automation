{{ if .Values.labs.datasphere.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datasphere-{{ .Values.tenant.user.name | lower }}
  namespace: openshift-gitops
  labels:
    app: datasphere
    tenant: {{ .Values.tenant.name | lower }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants
  source:
    repoURL: {{ .Values.labs.datasphere.git.repoURL }}
    targetRevision: {{ .Values.labs.datasphere.git.targetRevision }}
    path: {{ .Values.labs.datasphere.git.path }}
    helm:
      values: |
        images:
          ui: {{ .Values.labs.datasphere.images.ui | quote }}
          api: {{ .Values.labs.datasphere.images.api | quote }}
        theme: {{ .Values.labs.datasphere.theme | quote }}
        api:
          replicas: {{ .Values.labs.datasphere.api.replicas }}
          probes:
            {{- .Values.labs.datasphere.api.probes | toYaml | nindent 12 }}
          resources:
            {{- .Values.labs.datasphere.api.resources | toYaml | nindent 12 }}
          hpa:
            {{- .Values.labs.datasphere.api.hpa | toYaml | nindent 12 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.labs.datasphere.namespace }}

  # Automated sync deploys DataSphere on creation and on git changes.
  # selfHeal: false ensures ArgoCD does NOT revert student changes
  # (scaling replicas, deleting pods, etc.) during Lab 3.
  syncPolicy:
    automated:
      selfHeal: false
      prune: false

{{- end }}
