apiVersion: apps/v1
kind: Deployment
metadata:
  name: datasphere-ui
  labels:
    app: datasphere
    component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: datasphere
      component: ui
  template:
    metadata:
      labels:
        app: datasphere
        component: ui
    spec:
      initContainers:
        - name: generate-nginx-conf
          image: registry.redhat.io/ubi9/python-312:latest
          command: ["/bin/python3", "-c"]
          args:
            - |
              import re, os
              ns_ip = "169.254.0.10"
              with open("/etc/resolv.conf") as f:
                for line in f:
                  m = re.match(r"nameserver\s+(\S+)", line)
                  if m:
                    ns_ip = m.group(1)
                    break
              ns = open("/var/run/secrets/kubernetes.io/serviceaccount/namespace").read().strip()
              api = "datasphere-api." + ns + ".svc.cluster.local"
              with open("/nginx-config/datasphere.conf", "w") as out:
                out.write("location / {\n")
                out.write("  root /opt/app-root/src;\n")
                out.write("  try_files $uri $uri/ /index.html;\n")
                out.write("}\n")
                out.write("location /api/ {\n")
                out.write("  resolver " + ns_ip + " valid=10s;\n")
                out.write("  set $api_upstream http://" + api + ":8080;\n")
                out.write("  proxy_pass          $api_upstream;\n")
                out.write("  proxy_set_header    Host              $host;\n")
                out.write("  proxy_set_header    X-Real-IP         $remote_addr;\n")
                out.write("  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;\n")
                out.write("  proxy_read_timeout  30s;\n")
                out.write("}\n")
              print("nginx config written: api=" + api + ", resolver=" + ns_ip)
          volumeMounts:
            - name: nginx-config
              mountPath: /nginx-config
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }

      containers:
        - name: ui
          image: {{ .Values.images.ui }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /opt/app-root/etc/nginx.default.d

      volumes:
        - name: nginx-config
          emptyDir: {}
