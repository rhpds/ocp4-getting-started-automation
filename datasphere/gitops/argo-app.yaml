apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datasphere
  namespace: openshift-gitops
spec:
  project: default
  source:
    # Update this URL to point to the student's Gitea repo
    repoURL: https://gitea.apps.cluster.example.com/userX/datasphere-gitops.git
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: datasphere
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
