# ── Theme ────────────────────────────────────────────────────────────────────
# Controls the DataSphere map theme. Currently only "earth" is supported.
theme: earth

# ── Images ───────────────────────────────────────────────────────────────────
images:
  # Pre-built UI image — pulled directly, never built in the workshop
  ui: quay.io/rhn_sa_sborenst/datasphere-ui:1.4.4
  # API image — built from source via S2I in Lab 2, then referenced here
  api: quay.io/rhn_sa_sborenst/datasphere-api:1.4.3
  redis: registry.redhat.io/rhel9/redis-7:latest

# ── API deployment settings ──────────────────────────────────────────────────
api:
  replicas: 1

  # Toggle resilience features on/off.
  # Lab 3 "Build It Yourself" uses --set to disable these so students can
  # add them manually via oc commands.
  probes:
    enabled: true
  resources:
    enabled: true
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50

ui:
  replicas: 1

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
