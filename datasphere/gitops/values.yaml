# ── Theme ────────────────────────────────────────────────────────────────────
# Controls the DataSphere map theme. Currently only "earth" is supported.
theme: earth

# ── Images ───────────────────────────────────────────────────────────────────
images:
  # Pre-built UI image — pulled directly, never built in the workshop
  ui: quay.io/rhn_sa_sborenst/datasphere-ui:1.4.4
  # API image — built from source via S2I in Lab 2, then referenced here
  api: quay.io/rhn_sa_sborenst/datasphere-api:1.4.4
  redis: registry.redhat.io/rhel9/redis-7:latest

# ── API deployment settings ──────────────────────────────────────────────────
api:
  replicas: 1

  # Extra datacenters injected at deploy time via GitOps.
  # Each entry appears on the DataSphere map alongside the built-in datacenters.
  # Lab 4 students add an entry here to bring a new region online.
  # Required fields: id, display_name, city, region, tier (major|regional),
  #                  lat, lng, base_capacity_pct, base_workload_count
  #
  # Example — MEA Hub (Nairobi):
  # extraDatacenters:
  #   - id: "rh-mea"
  #     display_name: "MEA Hub"
  #     city: "Nairobi"
  #     region: "Middle East & Africa"
  #     tier: "major"
  #     lat: -1.3
  #     lng: 36.8
  #     base_capacity_pct: 45
  #     base_workload_count: 892
  extraDatacenters: []

  # Toggle resilience features on/off.
  # Lab 3 "Build It Yourself" uses --set to disable these so students can
  # add them manually via oc commands.
  probes:
    enabled: true
  resources:
    enabled: true
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50

ui:
  replicas: 1

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
