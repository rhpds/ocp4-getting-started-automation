# ── Theme ────────────────────────────────────────────────────────────────────
# Controls the DataSphere map theme. Currently only "earth" is supported.
theme: earth

# ── Images ───────────────────────────────────────────────────────────────────
images:
  # Pre-built UI image — pulled directly, never built in the workshop
  ui: quay.io/rhpds/datasphere-ui:1.1.3
  # API image — built from source via S2I in Lab 2, then referenced here
  api: quay.io/redhat-gpte/datasphere-api:1.2.0

# ── Replica counts ───────────────────────────────────────────────────────────
api:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  hpa:
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50

ui:
  replicas: 1
