# ── Theme ────────────────────────────────────────────────────────────────────
# Controls the DataSphere map theme.
# Valid values: "earth" | "mars"
#
# Lab 10 (GitOps): Change this value to "mars" and commit to trigger
# Argo CD to sync and roll out the Mars theme automatically.
theme: earth

# ── Images ───────────────────────────────────────────────────────────────────
images:
  # Pre-built UI image — pulled directly, never built in the workshop
  ui: quay.io/nstephan/datasphere-ui:1.0.1-05
  # API image — built from source via S2I in Lab 6, then referenced here
  api: quay.io/nstephan/datasphere-api:1.0.0

# ── Replica counts ───────────────────────────────────────────────────────────
api:
  replicas: 1

ui:
  replicas: 1
