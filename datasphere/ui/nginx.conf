# Injected into the UBI nginx default server block via /opt/app-root/etc/nginx.default.d/
# Do NOT wrap in server {} — the UBI image provides the server block already.
#
# __NAMESERVER__ and __NAMESPACE__ are replaced at container startup by entrypoint.sh.
# The full FQDN is used because nginx's resolver does not apply /etc/resolv.conf
# search domains — short names like "datasphere-api" won't resolve.

location /api/ {
    resolver __NAMESERVER__ valid=30s ipv6=off;
    set $api_upstream http://datasphere-api.__NAMESPACE__.svc.cluster.local:8080;
    proxy_pass          $api_upstream;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout  30s;
}

# SPA routing — all other paths serve index.html
location / {
    try_files $uri $uri/ /index.html;
}
