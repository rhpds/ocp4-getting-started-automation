# Injected into the UBI nginx default server block via /opt/app-root/etc/nginx.default.d/
# Do NOT wrap in server {} — the UBI image provides the server block already.
#
# __NAMESERVER__ is replaced at container startup by entrypoint.sh with the
# cluster DNS IP from /etc/resolv.conf. This allows nginx to resolve
# datasphere-api per-request rather than at startup, so the UI starts cleanly
# even when the API is not yet deployed (e.g. Lab 1).

location /api/ {
    resolver __NAMESERVER__ valid=30s ipv6=off;
    set $api_upstream http://datasphere-api:8080;
    proxy_pass          $api_upstream/api/;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout  30s;
}

# SPA routing — all other paths serve index.html
location / {
    try_files $uri $uri/ /index.html;
}
